<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thực đơn - DD Food</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/menu.css" />
  </head>
  <body>
    <nav class="navbar sticky-top border-bottom">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold text-primary fs-3" href="../index.html">
          <i class="fas fa-chevron-left me-2"></i> DD-FOOD
        </a>

        <button
          class="btn-header-cart"
          id="header-cart-btn"
          onclick="toggleCart()"
        >
          <i class="fas fa-shopping-basket"></i>
          <div class="cart-divider"></div>
          <span id="header-cart-total">0đ</span>
          <span
            id="header-cart-count"
            class="badge bg-danger rounded-pill ms-2"
            style="font-size: 10px; display: none"
            >0</span
          >
        </button>
      </div>
    </nav>

    <section class="shop-header-section">
      <div class="container">
        <div class="d-flex gap-4 align-items-center">
          <div class="shop-thumb shadow-sm">
            <img
              id="res-avatar"
              src=""
              onerror="this.src='../assets/images/default-store.png'"
            />
          </div>
          <div class="flex-grow-1">
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb small text-muted mb-1">
                <li class="breadcrumb-item">
                  <a
                    href="../index.html"
                    class="text-decoration-none text-muted"
                    >Trang chủ</a
                  >
                </li>
                <li class="breadcrumb-item active">Nhà hàng</li>
              </ol>
            </nav>
            <h1 class="fw-bold mb-2 text-dark fs-2" id="res-name">
              Đang tải...
            </h1>
            <p class="text-muted mb-2 small" id="res-address">...</p>
            <div class="d-flex align-items-center gap-3 font-sm">
              <span class="text-warning fw-bold fs-5"
                ><i class="fas fa-star"></i> 4.8</span
              >
              <span class="text-secondary small"
                ><i class="far fa-clock"></i>
                <span id="res-time">...</span></span
              >
              <span id="res-status" class="badge bg-success rounded-1 fw-normal"
                >Mở cửa</span
              >
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="category-nav-wrapper sticky-top" style="top: 70px">
      <div class="container">
        <ul class="cat-nav-list" id="category-tabs"></ul>
      </div>
    </div>

    <div class="container py-4 mb-5">
      <div id="menu-container">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Đang tải thực đơn...</p>
        </div>
      </div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <aside class="cart-panel" id="cart-panel">
      <div class="cart-header">
        <h3>Giỏ hàng</h3>
        <button class="close-cart-btn" onclick="toggleCart()">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div id="cart-items" class="cart-body"></div>

      <div
        id="empty-cart-msg"
        style="
          display: none;
          height: 100%;
          align-items: center;
          justify-content: center;
          flex-direction: column;
        "
      >
        <i class="fas fa-shopping-basket fs-1 text-muted mb-3 opacity-25"></i>
        <p class="text-muted fs-5">Giỏ hàng trống</p>
      </div>

      <div id="cart-footer" class="cart-footer" style="display: none">
        <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
          <span>Tổng cộng</span>
          <span id="cart-total" class="text-primary">0đ</span>
        </div>
        <a
          href="checkout.html"
          class="btn-checkout"
          style="
            text-decoration: none;
            display: inline-block;
            text-align: center;
          "
        >
          Đặt món ngay
        </a>
      </div>
    </aside>

    <div class="modal fade" id="checkoutModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-2 border-0">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Xác nhận đơn hàng</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="checkoutForm">
              <div class="mb-3">
                <label class="small fw-bold">Người nhận</label
                ><input type="text" id="uName" class="form-control" readonly />
              </div>
              <div class="mb-3">
                <label class="small fw-bold">SĐT (*)</label
                ><input type="text" id="uPhone" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="small fw-bold">Địa chỉ (*)</label
                ><input
                  type="text"
                  id="uAddress"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="small fw-bold">Ghi chú</label
                ><textarea id="uNote" class="form-control" rows="2"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button class="btn-checkout" onclick="OrderManager.submitOrder()">
              Đặt hàng ngay
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/order.js"></script>
  </body>
</html>
