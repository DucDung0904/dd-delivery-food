<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theo dõi đơn hàng - DD Food</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/tracking.css" />
  </head>
  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <nav class="navbar navbar-expand-lg navbar-light navbar-glass fixed-top">
      <div class="container">
        <a
          class="navbar-brand fw-bold text-primary"
          href="../index.html"
          style="font-size: 24px"
        >
          <i class="fas fa-utensils me-2"></i>DD FOOD
        </a>
        <span class="text-secondary fw-bold">Order Tracking</span>
      </div>
    </nav>

    <div class="container" style="margin-top: 100px; padding-bottom: 50px">
      <ul class="nav nav-pills mb-5 justify-content-center" id="pills-tab">
        <li class="nav-item">
          <button
            class="nav-link active"
            id="tab-active"
            onclick="filterOrders('active')"
          >
            <i class="fas fa-box-open me-2"></i>Đang xử lý
          </button>
        </li>
        <li class="nav-item ps-3">
          <button
            class="nav-link"
            id="tab-history"
            onclick="filterOrders('history')"
          >
            <i class="fas fa-history me-2"></i>Lịch sử
          </button>
        </li>
      </ul>

      <div id="orders-container" class="row g-4 justify-content-center">
        <div class="text-center py-5">
          <div
            class="spinner-border text-primary"
            style="width: 3rem; height: 3rem"
          ></div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="orderDetailModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div
          class="modal-content border-0 shadow-lg"
          style="border-radius: 16px"
        >
          <div class="modal-header bg-white border-bottom-0 pb-0">
            <div>
              <h4 class="modal-title fw-bold text-primary" id="detail-id">
                #Loading...
              </h4>
              <p class="text-muted mb-0 fs-5" id="detail-date">--/--/----</p>
            </div>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body p-4">
            <div id="detail-stepper" class="mb-5 mt-2"></div>

            <div
              id="detail-shipper-area"
              class="mb-4"
              style="display: none"
            ></div>

            <h5 class="fw-bold border-bottom pb-2 mb-3">Chi tiết món ăn</h5>
            <div id="detail-items-list" class="mb-3 fs-5"></div>

            <div
              class="d-flex justify-content-between align-items-center pt-3 border-top mt-4"
            >
              <span class="h5 mb-0 text-secondary">Tổng thanh toán</span>
              <span class="h3 mb-0 text-danger fw-bold" id="detail-total"
                >0đ</span
              >
            </div>
          </div>

          <div class="modal-footer border-0 pt-0" id="detail-actions">
            <button
              type="button"
              class="btn btn-secondary btn-lg"
              data-bs-dismiss="modal"
            >
              Đóng
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="confirmCancelModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold text-danger">Xác nhận hủy đơn</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body fs-5 text-center">
            Bạn có chắc chắn muốn hủy đơn hàng này không?<br />
            <span class="text-muted fs-6"
              >Hành động này không thể hoàn tác.</span
            >
            <input type="hidden" id="cancel-order-id" />
          </div>
          <div class="modal-footer border-0 justify-content-center">
            <button
              type="button"
              class="btn btn-secondary btn-lg px-4"
              data-bs-dismiss="modal"
            >
              Không
            </button>
            <button
              type="button"
              class="btn btn-danger btn-lg px-4"
              onclick="TrackingApp.submitCancelOrder()"
            >
              Hủy đơn
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="ratingModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 16px">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold">Đánh giá dịch vụ</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body text-center">
            <p class="text-muted">Bạn cảm thấy món ăn thế nào?</p>
            <div class="rating-stars" id="star-container">
              <i class="fas fa-star" data-value="1"></i>
              <i class="fas fa-star" data-value="2"></i>
              <i class="fas fa-star" data-value="3"></i>
              <i class="fas fa-star" data-value="4"></i>
              <i class="fas fa-star" data-value="5"></i>
            </div>
            <textarea
              class="form-control bg-light border-0"
              rows="3"
              placeholder="Chia sẻ thêm cảm nhận của bạn..."
            ></textarea>
            <button class="btn btn-primary w-100 fw-bold mt-3 shadow-sm">
              Gửi đánh giá
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/tracking.js"></script>
  </body>
</html>
