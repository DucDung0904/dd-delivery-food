<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khám phá quán ăn - DD Food</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/all-restaurants.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light fixed-top bg-white shadow-sm"
    >
      <div class="container">
        <a
          class="navbar-brand fw-bold text-primary"
          href="../index.html"
          style="font-size: 24px"
        >
          <i class="fas fa-utensils me-2"></i>DD FOOD
        </a>

        <div class="d-flex align-items-center gap-3">
         
            <i class="fas fa-shopping-cart"></i>
          </a>
        </div>
      </div>
    </nav>

    <div class="container" style="margin-top: 100px; padding-bottom: 50px">
      <div class="search-section text-center mb-5">
        <h2 class="fw-bold mb-3 text-primary">Hôm nay bạn muốn ăn gì?</h2>
        <div class="search-box mx-auto position-relative">
          <i class="fas fa-search search-icon"></i>
          <input
            type="text"
            id="search-input"
            class="form-control form-control-lg rounded-pill ps-5"
            placeholder="Tìm tên quán, món ăn hấp dẫn..."
          />
        </div>
      </div>

      <div class="container mb-4 px-0">
        <div class="category-scroll-container">
          <div
            class="category-wrapper d-flex flex-nowrap align-items-center gap-4"
            id="category-wrapper"
          >
            <div class="category-indicator" id="cat-indicator"></div>
          </div>
        </div>
      </div>

      <div
        class="d-flex justify-content-between align-items-center mb-3 px-2 border-bottom pb-2"
      >
        <h5 class="fw-bold text-dark m-0">Gợi ý quán ngon</h5>
        <button
          class="btn btn-sm btn-light text-primary fw-bold"
          onclick="loadRestaurants()"
        >
          <i class="fas fa-sync-alt me-1"></i> Làm mới
        </button>
      </div>

      <div id="restaurant-grid" class="row g-4">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/all-restaurants.js"></script>
  </body>
</html>
